<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ร่างประกาศ — Ryujin</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { margin:0; font-family:-apple-system,"Segoe UI","Sarabun",sans-serif; background:#f2f3f5;
    color:#1a1a1a; padding:16px; max-width:460px; margin:0 auto; }
  h1 { font-size:20px; text-align:center; margin:8px 0 4px; }
  #who { text-align:center; font-size:15px; color:#555; margin-bottom:14px; min-height:20px; }
  #who b { color:#c0392b; }
  label { display:block; font-size:14px; font-weight:700; margin:14px 0 6px; }
  textarea { width:100%; padding:14px; border:1px solid #ccc; border-radius:12px; font-size:16px;
    font-family:inherit; background:#fff; min-height:140px; resize:vertical; }
  #count { font-size:12px; color:#888; text-align:right; margin-top:4px; }
  .preview { background:#fff; border:1px solid #eee; border-left:4px solid #c0392b; border-radius:10px;
    padding:12px; margin-top:12px; white-space:pre-wrap; font-size:15px; display:none; }
  #send { width:100%; border:none; border-radius:14px; padding:16px; font-size:17px; font-weight:700;
    background:#c0392b; color:#fff; margin-top:18px; cursor:pointer; }
  #send:disabled { opacity:.45; }
  #status { margin-top:14px; text-align:center; font-size:15px; min-height:24px; font-weight:600; }
  .ok{color:#27ae60;} .bad{color:#c0392b;} .wait{color:#e67e22;}
  .note { font-size:12px; color:#888; text-align:center; margin-top:6px; }
</style>
</head>
<body>
  <h1>📣 ร่างประกาศถึงพนักงาน</h1>
  <div id="who">กำลังโหลด…</div>

  <label>ข้อความประกาศ</label>
  <textarea id="msg" placeholder="เช่น พรุ่งนี้ประชุมทีม 10 โมง / ปรับเมนูใหม่เริ่ม 1 ก.ค."></textarea>
  <div id="count">0 ตัวอักษร</div>
  <div class="preview" id="preview"></div>

  <button id="send" disabled>📣 ส่งประกาศให้ทุกสาขา</button>
  <div class="note">⚠️ กดแล้วส่งหาพนักงานทุกคนทุกสาขาทันที</div>
  <div id="status"></div>

<script>
/* ===== ตั้งค่า — เติม LIFF_ID ทีหลัง ===== */
const CONFIG = { LIFF_ID: "", WEBHOOK_URL: "https://sittan.app.n8n.cloud/webhook/announce" };

const $ = id => document.getElementById(id);
let state = { userId:"", displayName:"", confirming:false };

$("msg").addEventListener("input", () => {
  const v = $("msg").value;
  $("count").textContent = v.length + " ตัวอักษร";
  $("send").disabled = (v.trim() === "");
  state.confirming = false; $("send").textContent = "📣 ส่งประกาศให้ทุกสาขา"; $("preview").style.display="none";
});

async function initWho(){
  if(!CONFIG.LIFF_ID){ $("who").innerHTML="🧪 โหมดทดสอบ (ยังไม่ตั้ง LIFF)"; state.userId="TEST"; return; }
  try{
    await liff.init({ liffId: CONFIG.LIFF_ID });
    if(!liff.isLoggedIn()){ liff.login(); return; }
    const p = await liff.getProfile();
    state.userId=p.userId; state.displayName=p.displayName;
    $("who").innerHTML="ผู้ประกาศ: <b>"+p.displayName+"</b>";
  }catch(e){ $("who").innerHTML="🧪 โหมดทดสอบ (นอก LINE)"; state.userId="TEST"; }
}

/* กด 1 = ดูตัวอย่าง+ยืนยัน · กด 2 = ส่งจริง */
$("send").onclick = async () => {
  const text = $("msg").value.trim();
  if(!text) return;
  if(!state.confirming){
    $("preview").textContent = "📣 ประกาศจากบริษัท\n\n" + text;
    $("preview").style.display = "block";
    $("send").textContent = "✅ ยืนยันส่งจริง (กดอีกครั้ง)";
    state.confirming = true;
    return;
  }
  $("send").disabled = true;
  $("status").innerHTML = '<span class="wait">⏳ กำลังส่ง…</span>';
  try{
    const res = await fetch(CONFIG.WEBHOOK_URL, { method:"POST",
      headers:{"Content-Type":"application/json"}, body: JSON.stringify({ userId: state.userId, message: text }) });
    const d = await res.json().catch(()=>({}));
    if(!res.ok) throw new Error("HTTP "+res.status);
    if(d.denied){ $("status").innerHTML='<span class="bad">⛔ เฉพาะผู้บริหารส่งได้</span>'; }
    else { $("status").innerHTML='<span class="ok">✅ ส่งประกาศแล้ว! ('+(d.count||0)+' คน)</span>';
      if(CONFIG.LIFF_ID && window.liff && liff.isInClient && liff.isInClient()) setTimeout(()=>liff.closeWindow(),2000); }
  }catch(e){ $("status").innerHTML='<span class="bad">❌ ส่งไม่สำเร็จ ลองใหม่</span>'; $("send").disabled=false; }
};

initWho();
</script>
</body>
</html>
