<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ส่งเลขบัญชีธนาคาร — Ryujin</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { margin:0; font-family:-apple-system,"Segoe UI","Sarabun",sans-serif; background:#f2f3f5;
    color:#1a1a1a; padding:16px; max-width:460px; margin:0 auto; }
  h1 { font-size:20px; text-align:center; margin:8px 0 4px; }
  #who { text-align:center; font-size:15px; color:#555; margin-bottom:6px; min-height:20px; }
  #who b { color:#16a34a; }
  .note { font-size:13px; color:#666; background:#eef6ee; border:1px solid #cfe6cf; padding:10px 12px;
    border-radius:10px; margin:8px 0 4px; line-height:1.5; }
  label { display:block; font-size:14px; font-weight:700; margin:16px 0 6px; }
  .banks { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .banks button { padding:13px 8px; border:2px solid #ddd; border-radius:12px; background:#fff;
    font-size:15px; font-weight:700; cursor:pointer; font-family:inherit; color:#444; }
  .banks button.sel { border-color:#16a34a; background:#eafaef; color:#16a34a; }
  input { width:100%; padding:13px; border:1px solid #ccc; border-radius:10px;
    font-size:18px; font-family:inherit; background:#fff; letter-spacing:1px; }
  .hint { font-size:12px; color:#888; margin-top:5px; }
  #submit { width:100%; border:none; border-radius:14px; padding:16px; font-size:17px; font-weight:700;
    background:#16a34a; color:#fff; margin-top:20px; cursor:pointer; font-family:inherit; }
  #submit:disabled { opacity:.45; }
  #status { margin-top:14px; text-align:center; font-size:15px; min-height:24px; font-weight:600; }
  .ok{color:#16a34a;} .bad{color:#c0392b;} .wait{color:#e67e22;}
</style>
</head>
<body>
  <h1>🏦 ส่งเลขบัญชีธนาคาร</h1>
  <div id="who">กำลังโหลด…</div>
  <div class="note">บริษัทจะโอนเงินเดือนเข้าบัญชีนี้ — กรุณากรอกให้ถูกต้อง 🙏<br>แนะนำ <b>กสิกรไทย</b> (โอนทีเดียวทั้งบริษัท)</div>

  <label>ธนาคาร</label>
  <div class="banks" id="banks">
    <button data-b="กสิกรไทย">🟢 กสิกรไทย</button>
    <button data-b="ไทยพาณิชย์">🟣 ไทยพาณิชย์</button>
    <button data-b="กรุงไทย">🔵 กรุงไทย</button>
    <button data-b="กรุงเทพ">🔷 กรุงเทพ</button>
    <button data-b="กรุงศรีอยุธยา">🟡 กรุงศรี</button>
    <button data-b="ออมสิน">🌸 ออมสิน</button>
    <button data-b="ทหารไทยธนชาต">🔶 ttb</button>
    <button data-b="อื่นๆ">➕ อื่นๆ</button>
  </div>

  <label>เลขบัญชี</label>
  <input type="tel" id="account" inputmode="numeric" placeholder="เช่น 1234567890" autocomplete="off">
  <div class="hint">พิมพ์เฉพาะตัวเลข (กสิกร = 10 หลัก)</div>

  <label>ชื่อบัญชี (ภาษาอังกฤษ)</label>
  <input type="text" id="nameEn" placeholder="เช่น Somchai Jaidee" autocomplete="off">
  <div class="hint">ชื่อ-สกุล อังกฤษ ตามหน้าสมุดบัญชี (ถ้ามี · เว้นว่างได้)</div>

  <button id="submit" disabled>บันทึกเลขบัญชี</button>
  <div id="status"></div>

<script>
/* ===== ตั้งค่า =====
   LIFF_ID    : สร้าง LIFF ใหม่ "ส่งเลขบัญชี" endpoint = .../ryujin-clockin/bank/ แล้ววางที่นี่
   WEBHOOK_URL: n8n /webhook/bank-save                     */
const CONFIG = { LIFF_ID: "", WEBHOOK_URL: "https://sittan.app.n8n.cloud/webhook/bank-save" };

const $ = id => document.getElementById(id);
let state = { userId:"", displayName:"", bank:"กสิกรไทย" };

/* กสิกรเป็นค่าเริ่มต้น */
document.querySelector('#banks button[data-b="กสิกรไทย"]').classList.add("sel");

document.querySelectorAll("#banks button").forEach(b => b.onclick = () => {
  document.querySelectorAll("#banks button").forEach(x => x.classList.remove("sel"));
  b.classList.add("sel"); state.bank = b.dataset.b; refresh();
});
$("account").addEventListener("input", () => {
  $("account").value = $("account").value.replace(/[^0-9]/g, "");
  refresh();
});
function refresh(){ $("submit").disabled = !(state.bank && $("account").value.length >= 6); }

/* LIFF */
async function initWho(){
  if(!CONFIG.LIFF_ID){ $("who").innerHTML="🧪 โหมดทดสอบ (ยังไม่ตั้ง LIFF)"; state.userId="TEST"; return; }
  try{
    await liff.init({ liffId: CONFIG.LIFF_ID });
    if(!liff.isLoggedIn()){ liff.login(); return; }
    const p = await liff.getProfile();
    state.userId=p.userId; state.displayName=p.displayName;
    $("who").innerHTML="พนักงาน: <b>"+p.displayName+"</b>";
  }catch(e){ $("who").innerHTML="🧪 โหมดทดสอบ (นอก LINE)"; state.userId="TEST"; }
}

$("submit").onclick = async () => {
  $("submit").disabled = true;
  $("status").innerHTML = '<span class="wait">⏳ กำลังบันทึก…</span>';
  const payload = {
    userId: state.userId, displayName: state.displayName,
    bank: state.bank,
    account: $("account").value.trim(),
    nameEn: $("nameEn").value.trim()
  };
  if(!CONFIG.WEBHOOK_URL){
    $("status").innerHTML='<span class="wait">🧪 โหมดทดสอบ: ยังไม่ตั้ง webhook (ดู console)</span>';
    console.log("BANK PAYLOAD:", payload); return;
  }
  try{
    const res = await fetch(CONFIG.WEBHOOK_URL,{ method:"POST",
      headers:{"Content-Type":"application/json"}, body:JSON.stringify(payload) });
    const data = await res.json().catch(()=>({}));
    if(!res.ok) throw new Error("HTTP "+res.status);
    if(data && data.ok === false){
      $("status").innerHTML='<span class="bad">⚠️ ไม่พบข้อมูลพนักงาน — แจ้งผู้จัดการ (ยังไม่ลงทะเบียน LINE)</span>';
      $("submit").disabled=false; return;
    }
    $("status").innerHTML='<span class="ok">✅ บันทึกเลขบัญชีแล้ว ขอบคุณครับ</span>';
    if(CONFIG.LIFF_ID && window.liff && liff.isInClient && liff.isInClient()) setTimeout(()=>liff.closeWindow(),1800);
  }catch(e){ $("status").innerHTML='<span class="bad">❌ บันทึกไม่สำเร็จ ลองใหม่</span>'; refresh(); }
};

initWho();
</script>
</body>
</html>
