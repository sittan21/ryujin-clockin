<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ลงเวลาทำงาน — Ryujin</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0; font-family: -apple-system, "Segoe UI", "Sarabun", sans-serif;
    background: #f2f3f5; color: #1a1a1a; padding: 16px; max-width: 460px; margin: 0 auto;
  }
  h1 { font-size: 20px; text-align: center; margin: 8px 0 4px; }
  #who { text-align: center; font-size: 15px; color: #555; margin-bottom: 12px; min-height: 20px; }
  #who b { color: #c0392b; }
  .cam-wrap {
    position: relative; width: 100%; aspect-ratio: 3/4; background: #000;
    border-radius: 16px; overflow: hidden; margin-bottom: 10px;
  }
  #cam, #preview { width: 100%; height: 100%; object-fit: cover; display: block; }
  #preview { display: none; }
  .clock { position: absolute; top: 8px; left: 8px; background: rgba(0,0,0,.55); color:#fff;
    padding: 4px 10px; border-radius: 20px; font-size: 13px; }
  button {
    width: 100%; border: none; border-radius: 14px; padding: 16px; font-size: 17px;
    font-weight: 700; cursor: pointer; margin-bottom: 10px; font-family: inherit;
  }
  #snap { background: #34495e; color: #fff; }
  #retake { background: #7f8c8d; color: #fff; display: none; }
  #gps { font-size: 14px; text-align: center; padding: 10px; border-radius: 12px;
    background: #fff; margin-bottom: 12px; }
  .ok { color: #27ae60; } .bad { color: #c0392b; } .wait { color: #e67e22; }
  .actions { display: flex; gap: 10px; }
  .actions button { margin-bottom: 0; }
  #btnIn { background: #27ae60; color: #fff; }
  #btnOut { background: #c0392b; color: #fff; }
  button:disabled { opacity: .45; cursor: not-allowed; }
  #status { margin-top: 14px; text-align: center; font-size: 15px; min-height: 24px; font-weight: 600; }
  .hint { font-size: 12px; color: #888; text-align: center; margin-top: 4px; }
</style>
</head>
<body>
  <h1>⏱️ ลงเวลาทำงาน</h1>
  <div id="who">กำลังโหลด…</div>

  <div class="cam-wrap">
    <video id="cam" autoplay playsinline muted></video>
    <img id="preview" alt="selfie preview">
    <div class="clock" id="clock">--:--</div>
  </div>

  <button id="snap">📸 ถ่ายเซลฟี่</button>
  <button id="retake">↺ ถ่ายใหม่</button>

  <div id="gps" class="wait">📍 กำลังหาตำแหน่ง…</div>

  <div class="actions">
    <button id="btnIn" disabled>เข้างาน</button>
    <button id="btnOut" disabled>เลิกงาน</button>
  </div>

  <div id="status"></div>
  <div class="hint">ถ่ายเซลฟี่สด + เปิด GPS แล้วกดเข้า/เลิกงาน</div>

<canvas id="canvas" hidden></canvas>
<script>
/* ===== ตั้งค่า — เติม 2 ค่านี้ทีหลัง =====
   LIFF_ID    : ได้จาก Step 3 (สร้าง LIFF app ใน LINE Developers)
   WEBHOOK_URL: ได้จาก Step 4 (n8n webhook ที่รับข้อมูลลงเวลา)            */
const CONFIG = {
  LIFF_ID: "2010363505-SKKkDoTf",   // ✅ ตั้งแล้ว (Step 3)
  WEBHOOK_URL: ""                   // Step 4 (n8n webhook รับข้อมูลลงเวลา)
};

let state = { userId: "", displayName: "", photo: "", lat: null, lng: null, acc: null };

const $ = id => document.getElementById(id);
const video = $("cam"), preview = $("preview"), canvas = $("canvas");

/* นาฬิกามุมรูป */
setInterval(() => {
  const d = new Date();
  $("clock").textContent = d.toLocaleTimeString("th-TH", { hour:"2-digit", minute:"2-digit", second:"2-digit" });
}, 1000);

/* ---- 1) รู้ว่าใคร (LINE LIFF) ---- */
async function initWho() {
  if (!CONFIG.LIFF_ID) { $("who").innerHTML = "🧪 โหมดทดสอบ (ยังไม่ตั้ง LIFF)"; state.userId = "TEST"; return; }
  try {
    await liff.init({ liffId: CONFIG.LIFF_ID });
    if (!liff.isLoggedIn()) { liff.login(); return; }
    const p = await liff.getProfile();
    state.userId = p.userId; state.displayName = p.displayName;
    $("who").innerHTML = "สวัสดี <b>" + p.displayName + "</b>";
  } catch (e) {
    $("who").innerHTML = "🧪 โหมดทดสอบ (เปิดนอก LINE)"; state.userId = "TEST";
  }
}

/* ---- 2) กล้องสด (ถ่ายสดเท่านั้น ไม่มีอัปโหลดไฟล์) ---- */
async function initCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: "user", width: { ideal: 720 } }, audio: false
    });
    video.srcObject = stream;
  } catch (e) {
    $("status").innerHTML = '<span class="bad">❌ เปิดกล้องไม่ได้ — กดอนุญาตกล้อง</span>';
  }
}
$("snap").onclick = () => {
  const w = 540, h = w * 4/3;
  canvas.width = w; canvas.height = h;
  canvas.getContext("2d").drawImage(video, 0, 0, w, h);
  state.photo = canvas.toDataURL("image/jpeg", 0.7);
  preview.src = state.photo; preview.style.display = "block"; video.style.display = "none";
  $("snap").style.display = "none"; $("retake").style.display = "block";
  refreshButtons();
};
$("retake").onclick = () => {
  state.photo = ""; preview.style.display = "none"; video.style.display = "block";
  $("snap").style.display = "block"; $("retake").style.display = "none";
  refreshButtons();
};

/* ---- 3) GPS ---- */
function initGPS() {
  if (!navigator.geolocation) { $("gps").className = "bad"; $("gps").textContent = "❌ อุปกรณ์ไม่รองรับ GPS"; return; }
  navigator.geolocation.getCurrentPosition(
    pos => {
      state.lat = pos.coords.latitude; state.lng = pos.coords.longitude; state.acc = Math.round(pos.coords.accuracy);
      $("gps").className = "ok";
      $("gps").textContent = `📍 ได้ตำแหน่งแล้ว (±${state.acc} ม.)`;
      refreshButtons();
    },
    err => { $("gps").className = "bad"; $("gps").textContent = "❌ หาตำแหน่งไม่ได้ — กดอนุญาตตำแหน่ง"; },
    { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
  );
}

/* ---- เปิด/ปิดปุ่ม เข้า-ออก เมื่อมีรูป+GPS ครบ ---- */
function refreshButtons() {
  const ready = !!state.photo && state.lat !== null;
  $("btnIn").disabled = !ready; $("btnOut").disabled = !ready;
}

/* ---- 4) ส่งข้อมูลลงเวลา ---- */
async function submit(type) {
  $("btnIn").disabled = true; $("btnOut").disabled = true;
  $("status").innerHTML = '<span class="wait">⏳ กำลังบันทึก…</span>';
  const payload = {
    userId: state.userId, displayName: state.displayName,
    type: type,                              // "in" = เข้างาน, "out" = เลิกงาน
    photo: state.photo,                      // base64 jpeg (เซลฟี่สด)
    lat: state.lat, lng: state.lng, accuracy: state.acc,
    clientTime: new Date().toISOString()
  };
  if (!CONFIG.WEBHOOK_URL) {
    $("status").innerHTML = '<span class="wait">🧪 โหมดทดสอบ: ยังไม่ตั้ง webhook<br>ข้อมูลพร้อมส่งแล้ว (ดู console)</span>';
    console.log("CLOCK PAYLOAD:", payload);
    return;
  }
  try {
    const res = await fetch(CONFIG.WEBHOOK_URL, {
      method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload)
    });
    if (!res.ok) throw new Error("HTTP " + res.status);
    $("status").innerHTML = '<span class="ok">✅ บันทึก' + (type==="in"?"เข้างาน":"เลิกงาน") + 'แล้ว!</span>';
    if (CONFIG.LIFF_ID && window.liff && liff.isInClient && liff.isInClient()) setTimeout(() => liff.closeWindow(), 1500);
  } catch (e) {
    $("status").innerHTML = '<span class="bad">❌ ส่งไม่สำเร็จ ลองใหม่</span>';
    refreshButtons();
  }
}
$("btnIn").onclick = () => submit("in");
$("btnOut").onclick = () => submit("out");

/* ---- เริ่ม ---- */
initWho(); initCamera(); initGPS();
</script>
</body>
</html>
