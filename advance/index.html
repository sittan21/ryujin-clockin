<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>อนุมัติเบิกเงิน + อัปสลิป — Ryujin</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { margin:0; font-family:-apple-system,"Segoe UI","Sarabun",sans-serif; background:#f2f3f5;
    color:#1a1a1a; padding:16px; max-width:460px; margin:0 auto; }
  h1 { font-size:20px; text-align:center; margin:8px 0 4px; }
  .info { background:#fff; border-radius:12px; padding:14px 16px; margin:10px 0; box-shadow:0 1px 4px rgba(0,0,0,.07); }
  .info .r { display:flex; justify-content:space-between; font-size:15px; padding:3px 0; }
  .info .r span { color:#888; } .info .r b { font-weight:700; }
  label { display:block; font-size:14px; font-weight:700; margin:16px 0 6px; }
  input[type=tel] { width:100%; padding:13px; border:1px solid #ccc; border-radius:10px;
    font-size:20px; font-family:inherit; background:#fff; letter-spacing:1px; text-align:center; font-weight:700; }
  .filebtn { display:block; width:100%; padding:14px; border:2px dashed #1DB954; border-radius:12px;
    background:#eafaef; color:#0a8f3c; font-size:15px; font-weight:700; text-align:center; cursor:pointer; }
  #preview { width:100%; margin-top:10px; border-radius:10px; display:none; }
  .hint { font-size:12px; color:#888; margin-top:5px; }
  #submit { width:100%; border:none; border-radius:14px; padding:16px; font-size:17px; font-weight:700;
    background:#1DB954; color:#fff; margin-top:18px; cursor:pointer; font-family:inherit; }
  #submit:disabled { opacity:.45; }
  #status { margin-top:14px; text-align:center; font-size:15px; min-height:24px; font-weight:600; }
  .ok{color:#16a34a;} .bad{color:#c0392b;} .wait{color:#e67e22;}
</style>
</head>
<body>
  <h1>💵 อนุมัติเบิกเงินล่วงหน้า</h1>
  <div class="info">
    <div class="r"><span>👤 พนักงาน</span><b id="who">-</b></div>
    <div class="r"><span>📝 ยอดที่ขอ</span><b id="reqAmt">-</b></div>
  </div>
  <div class="note" style="font-size:13px;color:#666;background:#fff7e6;border:1px solid #ffe0a3;padding:10px 12px;border-radius:10px;line-height:1.5;">
    โอนเงินให้พนักงานเรียบร้อยแล้ว → กรอก <b>ยอดที่โอนจริง</b> + แนบ <b>สลิป</b> เพื่อบันทึกเป็นหนี้ (หักเงินเดือนปลายเดือน) 🙏
  </div>

  <label>ยอดที่โอนจริง (บาท)</label>
  <input type="tel" inputmode="numeric" id="amount" placeholder="0">
  <div class="hint">ปรับได้ถ้าโอนไม่เท่ายอดที่ขอ — ยอดนี้คือยอดที่จะหักเงินเดือน</div>

  <label>สลิปโอนเงิน (หลักฐาน)</label>
  <label class="filebtn" for="file">📷 แตะเพื่อถ่าย/เลือกรูปสลิป</label>
  <input type="file" id="file" accept="image/*" style="display:none">
  <img id="preview">

  <button id="submit" disabled>✅ ยืนยันอนุมัติ + บันทึกหนี้</button>
  <div id="status"></div>

<script>
/* ===== ตั้งค่า =====
   LIFF_ID เว้นว่าง = เปิดเป็นหน้าเว็บปกติได้เลย (ไม่ต้องสร้าง LIFF) — ถ้าสร้าง LIFF "เบิกเงิน-สลิป" endpoint=/advance/ แล้ววาง ID จะเก็บชื่อผู้อนุมัติอัตโนมัติ */
const CONFIG = { LIFF_ID: "", WEBHOOK_URL: "https://sittan.app.n8n.cloud/webhook/advance-slip" };

const $ = id => document.getElementById(id);
const p = new URLSearchParams(location.search);
let req = p.get("req")||"", amt = p.get("amt")||"", name = p.get("name")||"";
if((!req) && p.get("liff.state")){ const s=new URLSearchParams(p.get("liff.state").replace(/^\?/,"")); req=s.get("req")||req; amt=s.get("amt")||amt; name=s.get("name")||name; }
$("who").textContent = name || "-";
$("reqAmt").textContent = amt ? (Number(amt).toLocaleString()+" ฿") : "-";
$("amount").value = amt || "";

let state = { approverId:"", approverName:"", photo:"" };

$("amount").addEventListener("input", () => { $("amount").value = $("amount").value.replace(/[^0-9]/g,""); refresh(); });
$("file").addEventListener("change", e => {
  const f = e.target.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = ev => { state.photo = ev.target.result; $("preview").src = ev.target.result; $("preview").style.display="block"; refresh(); };
  r.readAsDataURL(f);
});
function refresh(){ $("submit").disabled = !(Number($("amount").value||0) > 0 && state.photo); }

async function initWho(){
  if(!CONFIG.LIFF_ID) return;
  try{
    await liff.init({ liffId: CONFIG.LIFF_ID });
    if(!liff.isLoggedIn()){ liff.login(); return; }
    const prof = await liff.getProfile();
    state.approverId = prof.userId||""; state.approverName = prof.displayName||"";
  }catch(e){ state.approverId=""; state.approverName=""; }
}

$("submit").onclick = async () => {
  $("submit").disabled = true;
  $("status").innerHTML = '<span class="wait">⏳ กำลังบันทึก…</span>';
  const payload = { reqId: req, approverId: state.approverId, approverName: state.approverName,
    amount: Number($("amount").value||0), photo: state.photo };
  try{
    const res = await fetch(CONFIG.WEBHOOK_URL,{ method:"POST",
      headers:{"Content-Type":"application/json"}, body:JSON.stringify(payload) });
    const data = await res.json().catch(()=>({}));
    if(!res.ok) throw new Error("HTTP "+res.status);
    if(data && data.ok === false){ $("status").innerHTML='<span class="bad">⚠️ '+(data.message||"ไม่สำเร็จ")+'</span>'; $("submit").disabled=false; return; }
    $("status").innerHTML='<span class="ok">✅ บันทึกแล้ว แจ้งพนักงานเรียบร้อย</span>';
    if(CONFIG.LIFF_ID && window.liff && liff.isInClient && liff.isInClient()) setTimeout(()=>liff.closeWindow(),1800);
  }catch(e){ $("status").innerHTML='<span class="bad">❌ บันทึกไม่สำเร็จ ลองใหม่</span>'; refresh(); }
};

initWho(); refresh();
</script>
</body>
</html>
