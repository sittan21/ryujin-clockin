<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ส่งยอดขาย — Ryujin</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { margin:0; font-family:-apple-system,"Segoe UI","Sarabun",sans-serif; background:#f2f3f5;
    color:#1a1a1a; padding:16px; max-width:460px; margin:0 auto; }
  h1 { font-size:20px; text-align:center; margin:8px 0 4px; }
  #who { text-align:center; font-size:15px; color:#555; margin-bottom:14px; min-height:20px; }
  #who b { color:#0a7c3f; }
  label { display:block; font-size:14px; font-weight:700; margin:14px 0 6px; }
  input { width:100%; padding:12px; border:1px solid #ccc; border-radius:10px; font-size:16px; font-family:inherit; background:#fff; }
  .pick { display:block; width:100%; text-align:center; padding:16px; border:2px dashed #0a7c3f; border-radius:14px;
    background:#eafaf933; color:#0a7c3f; font-size:16px; font-weight:700; cursor:pointer; }
  #file { display:none; }
  #preview { width:100%; border-radius:12px; margin-top:10px; display:none; }
  #form { display:none; }
  .row { display:flex; gap:8px; } .row > div { flex:1; }
  .hint { font-size:12px; color:#e67e22; text-align:center; margin-top:6px; }
  #save { width:100%; border:none; border-radius:14px; padding:16px; font-size:17px; font-weight:700;
    background:#0a7c3f; color:#fff; margin-top:18px; cursor:pointer; }
  #save:disabled { opacity:.45; }
  #status { margin-top:14px; text-align:center; font-size:15px; min-height:24px; font-weight:600; }
  .ok{color:#27ae60;} .bad{color:#c0392b;} .wait{color:#e67e22;}
</style>
</head>
<body>
  <h1>💰 ส่งยอดขายวันนี้</h1>
  <div id="who">กำลังโหลด…</div>

  <label for="file" class="pick" id="pickLabel">📸 ถ่าย/เลือกรูปสรุปยอด POS</label>
  <input type="file" id="file" accept="image/*">
  <img id="preview" alt="preview">

  <div id="form">
    <div class="hint">⚠️ Gemini อ่านให้แล้ว — เช็ก/แก้ให้ถูก ก่อนยืนยัน</div>
    <label>วันที่</label><input type="date" id="date">
    <label>ยอดขายรวม (บาท) *</label><input type="number" id="total" inputmode="decimal">
    <div class="row">
      <div><label>เงินสด *</label><input type="number" id="cash" inputmode="decimal"></div>
      <div><label>โอน/บัตร *</label><input type="number" id="transfer" inputmode="decimal"></div>
    </div>
    <div class="hint">* บังคับกรอก — เงินสด/โอน พิมพ์จากหน้าสรุป (หน้า 2)</div>
    <label>จำนวนบิล (ถ้ามี)</label><input type="number" id="bills" inputmode="numeric">
    <button id="save" disabled>✅ ยืนยันบันทึกยอด</button>
  </div>
  <div id="status"></div>

<script>
/* ===== ตั้งค่า — เติม LIFF_ID ทีหลัง ===== */
const CONFIG = {
  LIFF_ID: "2010363505-3dTzyK1V",
  READ_URL: "https://sittan.app.n8n.cloud/webhook/sales-read",
  SAVE_URL: "https://sittan.app.n8n.cloud/webhook/sales-save"
};

const $ = id => document.getElementById(id);
let state = { userId:"", displayName:"" };
const today = new Date().toISOString().slice(0,10);
$("date").value = today;

async function initWho(){
  if(!CONFIG.LIFF_ID){ $("who").innerHTML="🧪 โหมดทดสอบ (ยังไม่ตั้ง LIFF)"; state.userId="TEST"; return; }
  try{
    await liff.init({ liffId: CONFIG.LIFF_ID });
    if(!liff.isLoggedIn()){ liff.login(); return; }
    const p = await liff.getProfile();
    state.userId=p.userId; state.displayName=p.displayName;
    $("who").innerHTML="ผู้ส่ง: <b>"+p.displayName+"</b>";
  }catch(e){ $("who").innerHTML="🧪 โหมดทดสอบ (นอก LINE)"; state.userId="TEST"; }
}

/* เลือกรูป → อ่านด้วย Gemini */
$("file").addEventListener("change", e => {
  const f = e.target.files[0]; if(!f) return;
  const reader = new FileReader();
  reader.onload = async () => {
    const dataUrl = reader.result;
    $("preview").src = dataUrl; $("preview").style.display = "block";
    $("status").innerHTML = '<span class="wait">⏳ Gemini กำลังอ่านยอด…</span>';
    try{
      const res = await fetch(CONFIG.READ_URL, { method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ userId: state.userId, photo: dataUrl }) });
      const d = await res.json().catch(()=>({}));
      if(!res.ok) throw new Error("HTTP "+res.status);
      if(d.total!=null) $("total").value = d.total;
      if(d.cash!=null) $("cash").value = d.cash;
      if(d.transfer!=null) $("transfer").value = d.transfer;
      if(d.bills!=null) $("bills").value = d.bills;
      if(d.date) $("date").value = d.date;
      $("form").style.display = "block"; $("save").disabled = false;
      $("status").innerHTML = '<span class="ok">✅ อ่านแล้ว — เช็กตัวเลขให้ถูก แล้วกดยืนยัน</span>';
    }catch(err){
      $("form").style.display = "block"; $("save").disabled = false;
      $("status").innerHTML = '<span class="bad">⚠️ อ่านรูปไม่สำเร็จ — กรอกเองได้เลย</span>';
    }
  };
  reader.readAsDataURL(f);
});

/* ยืนยันบันทึก */
$("save").onclick = async () => {
  if($("total").value==='' || $("cash").value==='' || $("transfer").value===''){ $("status").innerHTML='<span class="bad">⚠️ กรอก ยอดรวม + เงินสด + โอน ให้ครบทุกช่องก่อนนะ</span>'; return; }
  $("save").disabled = true;
  $("status").innerHTML = '<span class="wait">⏳ กำลังบันทึก…</span>';
  const payload = {
    userId: state.userId, date: $("date").value,
    total: $("total").value, cash: $("cash").value, transfer: $("transfer").value, bills: $("bills").value
  };
  try{
    const res = await fetch(CONFIG.SAVE_URL, { method:"POST",
      headers:{"Content-Type":"application/json"}, body: JSON.stringify(payload) });
    if(!res.ok) throw new Error("HTTP "+res.status);
    $("status").innerHTML = '<span class="ok">✅ บันทึกยอดขายแล้ว! ขอบคุณครับ</span>';
    if(CONFIG.LIFF_ID && window.liff && liff.isInClient && liff.isInClient()) setTimeout(()=>liff.closeWindow(),1800);
  }catch(e){ $("status").innerHTML='<span class="bad">❌ บันทึกไม่สำเร็จ ลองใหม่</span>'; $("save").disabled=false; }
};

initWho();
</script>
</body>
</html>
